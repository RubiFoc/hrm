name: hrm

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hrm:hrm@postgres:5432/hrm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HRM_JWT_SECRET: ${HRM_JWT_SECRET:-hrm-dev-secret-change-me}
      HRM_JWT_ALGORITHM: ${HRM_JWT_ALGORITHM:-HS256}
      HRM_ACCESS_TOKEN_TTL_SECONDS: ${HRM_ACCESS_TOKEN_TTL_SECONDS:-900}
      HRM_REFRESH_TOKEN_TTL_SECONDS: ${HRM_REFRESH_TOKEN_TTL_SECONDS:-604800}
      HRM_AUTH_REDIS_PREFIX: ${HRM_AUTH_REDIS_PREFIX:-auth:deny}
      HRM_CORS_ALLOWED_ORIGINS: ${HRM_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-hrm-documents}
      OBJECT_STORAGE_SSE_ENABLED: ${OBJECT_STORAGE_SSE_ENABLED:-false}
      CV_ALLOWED_MIME_TYPES: ${CV_ALLOWED_MIME_TYPES:-application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
      CV_MAX_SIZE_BYTES: ${CV_MAX_SIZE_BYTES:-10485760}
      CV_PARSING_MAX_ATTEMPTS: ${CV_PARSING_MAX_ATTEMPTS:-3}
      EMPLOYEE_KEY_TTL_SECONDS: ${EMPLOYEE_KEY_TTL_SECONDS:-604800}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_DEFAULT_QUEUE: ${CELERY_TASK_DEFAULT_QUEUE:-cv_parsing}
      CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-120}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hrm:hrm@postgres:5432/hrm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      HRM_JWT_SECRET: ${HRM_JWT_SECRET:-hrm-dev-secret-change-me}
      HRM_JWT_ALGORITHM: ${HRM_JWT_ALGORITHM:-HS256}
      HRM_ACCESS_TOKEN_TTL_SECONDS: ${HRM_ACCESS_TOKEN_TTL_SECONDS:-900}
      HRM_REFRESH_TOKEN_TTL_SECONDS: ${HRM_REFRESH_TOKEN_TTL_SECONDS:-604800}
      HRM_AUTH_REDIS_PREFIX: ${HRM_AUTH_REDIS_PREFIX:-auth:deny}
      HRM_CORS_ALLOWED_ORIGINS: ${HRM_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-http://minio:9000}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-hrm-documents}
      OBJECT_STORAGE_SSE_ENABLED: ${OBJECT_STORAGE_SSE_ENABLED:-false}
      CV_ALLOWED_MIME_TYPES: ${CV_ALLOWED_MIME_TYPES:-application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
      CV_MAX_SIZE_BYTES: ${CV_MAX_SIZE_BYTES:-10485760}
      CV_PARSING_MAX_ATTEMPTS: ${CV_PARSING_MAX_ATTEMPTS:-3}
      EMPLOYEE_KEY_TTL_SECONDS: ${EMPLOYEE_KEY_TTL_SECONDS:-604800}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      CELERY_TASK_DEFAULT_QUEUE: ${CELERY_TASK_DEFAULT_QUEUE:-cv_parsing}
      CELERY_TASK_TIME_LIMIT_SECONDS: ${CELERY_TASK_TIME_LIMIT_SECONDS:-120}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GOOGLE_CALENDAR_ENABLED: ${GOOGLE_CALENDAR_ENABLED:-false}
    command:
      - uv
      - run
      - --no-dev
      - celery
      - -A
      - hrm_backend.candidates.infra.celery.app:celery_app
      - worker
      - --loglevel=INFO
      - --queues=cv_parsing
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      backend-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  backend-migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hrm:hrm@postgres:5432/hrm}
    command: ["uv", "run", "--no-dev", "alembic", "-c", "alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrm}
      POSTGRES_USER: ${POSTGRES_USER:-hrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrm} -d ${POSTGRES_DB:-hrm}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres-init:
    image: postgres:16-alpine
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        export PGPASSWORD="${POSTGRES_PASSWORD:-hrm}"
        DB_NAME="${POSTGRES_DB:-hrm}"
        if [ "$(psql -h postgres -U "${POSTGRES_USER:-hrm}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$${DB_NAME}'")" != "1" ]; then
          psql -h postgres -U "${POSTGRES_USER:-hrm}" -d postgres -c "CREATE DATABASE \"$${DB_NAME}\" OWNER \"${POSTGRES_USER:-hrm}\""
        fi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}
        mc mb --ignore-existing local/${OBJECT_STORAGE_BUCKET:-hrm-documents}
        mc anonymous set none local/${OBJECT_STORAGE_BUCKET:-hrm-documents}
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
